<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2b3137;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24292e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#79c0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect width="800" height="200" rx="15" ry="15" fill="url(#grad)" filter="url(#shadow)" />
  
  <g transform="translate(100, 100)">
    <path d="M0,0 L20,-20 L40,10 L60,-30 L80,0 M80,0 L80,20 L0,20 Z" fill="#79c0ff" opacity="0.2" />
    <path d="M0,0 L20,-20 L40,10 L60,-30 L80,0" fill="none" stroke="#58a6ff" stroke-width="4" stroke-linejoin="round" />
    <circle cx="80" cy="0" r="5" fill="#58a6ff" />
  </g>

  <text x="440" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="900" fill="url(#textGrad)" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">GitHub Stargazers</text>
  <text x="440" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">GROWTH PLOTTER</text>
</svg>
